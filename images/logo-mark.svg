<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Two horizontal bars passing through, blue with thin white edges -->
  <line x1="0"  y1="50" x2="14" y2="50" stroke="#1F5FA8" stroke-width="5"/>
  <line x1="86" y1="50" x2="100" y2="50" stroke="#1F5FA8" stroke-width="5"/>
  <line x1="0"  y1="47.5" x2="14" y2="47.5" stroke="#ffffff" stroke-width="0.6"/>
  <line x1="0"  y1="52.5" x2="14" y2="52.5" stroke="#ffffff" stroke-width="0.6"/>
  <line x1="86" y1="47.5" x2="100" y2="47.5" stroke="#ffffff" stroke-width="0.6"/>
  <line x1="86" y1="52.5" x2="100" y2="52.5" stroke="#ffffff" stroke-width="0.6"/>

  <!-- Outer white disc -->
  <circle cx="50" cy="50" r="44" fill="#ffffff"/>
  <!-- Outer blue ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#1F5FA8" stroke-width="1.2"/>

  <!-- Wreath: 36 short blue tick marks evenly spaced -->
  <g stroke="#1F5FA8" stroke-width="2.4" stroke-linecap="round">
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate(  0 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate( 10 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate( 20 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate( 30 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate( 40 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate( 50 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate( 60 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate( 70 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate( 80 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate( 90 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate(100 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate(110 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate(120 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate(130 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate(140 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate(150 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate(160 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate(170 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate(180 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate(190 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate(200 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate(210 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate(220 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate(230 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate(240 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate(250 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate(260 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate(270 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate(280 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate(290 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate(300 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate(310 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate(320 50 50)"/>
