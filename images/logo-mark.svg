    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate(340 50 50)"/>
    <line x1="50" y1="9"  x2="50" y2="16" transform="rotate(350 50 50)"/>
  </g>

  <!-- Inner blue disc with thin white outline -->
  <circle cx="50" cy="50" r="30" fill="#1F5FA8"/>
  <circle cx="50" cy="50" r="30" fill="none" stroke="#ffffff" stroke-width="1.2"/>

  <!-- ME monogram, italic serif (like the original) -->
  <text x="50" y="63" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="34" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-1">ME</text>
</svg>
